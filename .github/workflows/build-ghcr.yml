name: Build and push to GHCR

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.gpu'
      - '.github/workflows/build-ghcr.yml'
      - 'scripts/**'
      - 'keys/**'
  workflow_dispatch:
    inputs:
      dockerfile:
        description: 'Dockerfile to build'
        required: false
        default: 'Dockerfile'
        type: choice
        options:
          - Dockerfile
          - Dockerfile.gpu
      api_level:
        description: 'Android API level'
        required: false
        default: '33'
        type: string
      img_type:
        description: 'System image type'
        required: false
        default: 'google_apis'
        type: choice
        options:
          - google_apis
          - google_apis_playstore

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch

      - name: Resolve build args
        id: args
        run: |
          echo "dockerfile=${{ github.event.inputs.dockerfile || 'Dockerfile' }}" >> "$GITHUB_OUTPUT"
          echo "api_level=${{ github.event.inputs.api_level || '33' }}" >> "$GITHUB_OUTPUT"
          echo "img_type=${{ github.event.inputs.img_type || 'google_apis' }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.args.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            API_LEVEL=${{ steps.args.outputs.api_level }}
            IMG_TYPE=${{ steps.args.outputs.img_type }}
